site_name: Isaac Assist Documentation
site_description: AI-powered assistant for NVIDIA Isaac Sim — natural language control for robotics simulation
site_url: https://k3street.github.io/Omniverse_Nemotron_Ext/
repo_url: https://github.com/k3street/Omniverse_Nemotron_Ext
repo_name: k3street/Omniverse_Nemotron_Ext

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started/quick-start.md
    - UI Orientation: getting-started/ui-orientation.md
    - Your First Task: getting-started/first-task.md
    - Glossary: getting-started/glossary.md
  - Guides:
    - Creating Objects: guides/creating-objects.md
    - Physics & Simulation: guides/physics-and-simulation.md
    - Importing Robots: guides/importing-robots.md
    - Sensors & Cameras: guides/sensors-and-cameras.md
    - Materials & Appearance: guides/materials.md
    - ROS2 Integration: guides/ros2.md
    - Scene Building: guides/scene-building.md
    - Debugging & Diagnostics: guides/debugging.md
  - Workflows:
    - Franka Pick-and-Place: workflows/franka-pick-and-place.md
    - Nova Carter Navigation: workflows/nova-carter-navigation.md
    - Synthetic Data Generation: workflows/synthetic-data.md
  - Reference:
    - Tools Reference: reference/tools.md
    - Configuration: reference/configuration.md
    - Troubleshooting: reference/troubleshooting.md
    - API Endpoints: reference/api-endpoints.md
  - Architecture:
    - Overview: architecture/overview.md
    - Extension & Service: architecture/extension-and-service.md
