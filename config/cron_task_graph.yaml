metadata:
  created_date: "2026-05-15"
  generator: "Phase 4 synthesis"
  version: "1.0"
  source_research:
    - "docs/research/2026-05-15-q1-flow-architecture.md"
    - "docs/research/2026-05-15-q2-canonical-format.md"
    - "docs/research/2026-05-15-q3-retrieval-quality.md"
    - "docs/research/2026-05-15-q4-template-drift.md"
    - "docs/research/2026-05-15-q5-gemini-integration.md"
    - "docs/research/2026-05-15-q6-canonical-pipeline.md"
    - "docs/research/2026-05-15-q7-task-graph.md"
    - "docs/research/2026-05-15-q8-iterative-retrieval.md"
    - "docs/research/2026-05-14-l-levels-discovery-audit.md"
  parent_spec: "docs/specs/2026-05-15-canonical-flow-standardization-spec.md"
  execution_plan: "docs/specs/2026-05-15-autonomous-execution-plan.md"
  total_tasks: 82
  critical_path_task_count: 11
  estimated_total_wall_time_hours: 148
  agent_class_legend:
    sonnet: "Pure file edits / analysis; runs autonomously in cron."
    opus: "Synthesis with cross-doc reasoning; reserved for review-author cycles."
    kit-rpc-sonnet: "Sonnet that touches Kit RPC at 127.0.0.1:8001. Single-tenant; sequential gating required."
    human-review: "Anton manual approval gate."
  estimated_minutes_legend: [5, 15, 30, 60, 120, 360]
  priority_tier_legend:
    1: "Must-do, blocks everything downstream."
    2: "High-leverage; do after Tier-1."
    3: "Nice-to-have / opportunistic."
  concurrency_rules:
    - "Kit-rpc-sonnet tasks MUST be serialized (no concurrent direct_eval per MEMORY.md kit_concurrency feedback)."
    - "Restart uvicorn (port 8000) after every tool_executor edit per MEMORY.md service_restart feedback."
    - "Restart Kit every ~30 canonicals per MEMORY.md kit_restart_autonomous feedback."
    - "Never run parallel ChromaDB writes (HNSW segfault risk) per Q6 §7.5 + MEMORY.md."
  halt_criteria:
    or_gate: true
    description: "Cron halts when ANY of the following fires. OR-semantics."
    criteria:
      - id: "quality_hit_at_1"
        description: "30-prompt retrieval benchmark hit@1 ≥ 0.75"
        measurement_command: "python scripts/qa/run_retrieval_benchmark.py --baseline workspace/benchmarks/retrieval_30prompts_v1.jsonl --metric hit_at_1 --threshold 0.75"
        source: "Q3 §8 + Q7 §5.1"
      - id: "quantity_yrkesroll"
        description: "50 yrkesroll canonicals migrated with intent + roles + function-gate ✓"
        measurement_command: |
          python -c '
          import json, glob
          cnt = sum(1 for f in glob.glob("workspace/templates/CP-NEW-*.json") + glob.glob("workspace/templates/TP-*.json") if "intent" in json.load(open(f)) and "function-gate ✓" in json.load(open(f)).get("verified_status", ""))
          print(cnt)
          ' >= 50
        source: "Q6 §6 + Q7 §5.2"
      - id: "time_6_week_cap"
        description: "6-week safety cap from start_date"
        measurement_command: "42-day calendar check from metadata.start_date_stamp"
        source: "Research-spec §7 Q5 + Q7 §5.3"
      - id: "user_stop"
        description: "User issues 'stop' / 'pause' / 'halt' via cron_state.user_signal"
        source: "MEMORY feedback_dont_pause_in_autonomous_mode (implies explicit stop required)"
  approval_cadence_rules:
    - id: "every_10_tasks"
      pause_type: "informational"
      description: "Mini-report every 10 completed tasks; loop continues unless user stops"
      source: "Q7 §7 + research-spec §7 Q6"
    - id: "before_kit_hard_failure_restart"
      pause_type: "blocking"
      description: "Pause once if Kit died unexpectedly; routine drift-restart is autonomous per MEMORY"
      source: "MEMORY feedback_kit_restart_autonomous"
    - id: "before_template_delete"
      pause_type: "blocking"
      description: "Any template delete needs explicit Anton OK"
      source: "MEMORY feedback_confirm_destructive_actions"
    - id: "before_git_push_remote"
      pause_type: "blocking"
      description: "Cron does NOT auto-push; pushes go to anton remote (not k3street)"
      source: "MEMORY feedback_isaac_assist_push_target + feedback_isaac_assist_pr_workflow"
    - id: "before_final_spec_commit"
      pause_type: "blocking"
      description: "t82 final synthesis spec needs human review before commit"
      source: "Q7 §7"

