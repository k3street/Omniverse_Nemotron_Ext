    inputs: [t30]
    outputs:
      - "workspace/templates/CP-67.json (updated verified_status)"
    verification: "python scripts/qa/function_gate_suite.py --filter CP-67 --runs 3"
    estimated_minutes: 30
    risk_level: med
    priority_tier: 3
    cron_safe: true
    source: "Q4 §5.3"
    track: A_drift_remediation

  - id: t07
    title: "Form-gate 3 priority D2 templates (CP-22, CP-46, CP-51)"
    agent_class: kit-rpc-sonnet
    inputs: [t30]
    outputs:
