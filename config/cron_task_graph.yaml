# ---------------------------------------------------------------------
# Validation: dependency edges, agent classes, cron_safe rules
# ---------------------------------------------------------------------
validation:
  rules:
    - "Every dependency edge in task.inputs must point to an existing task ID."
    - "Every task with cron_safe=true and agent_class=kit-rpc-sonnet must have at least one input (t30 or a Kit-bound predecessor)."
    - "Every task with agent_class=human-review must have cron_safe=false."
    - "Every Opus task must have agent_class=opus."
    - "All task IDs follow pattern t\\d{2}."
    - "Total task count must equal 82."
    - "Critical path must contain exactly 11 IDs."
  run_check: |
    python -c '
    import yaml
    data = yaml.safe_load(open("config/cron_task_graph.yaml"))
    tasks_by_id = {t["id"]: t for t in data["tasks"]}
    errors = []
    for t in data["tasks"]:
        for dep in t.get("inputs", []):
            if dep not in tasks_by_id:
                errors.append(f"Dangling dep: {t[\"id\"]} -> {dep}")
        if t["agent_class"] == "human-review" and t.get("cron_safe", True):
            errors.append(f"{t[\"id\"]}: human-review must be cron_safe=false")
    if errors:
        print("\\n".join(errors)); exit(1)
    assert len(data["tasks"]) == 82, f"Expected 82 tasks, got {len(data[\"tasks\"])}"
    assert len(data["critical_path"]) == 11
    print("OK: all 82 tasks consistent; 11 critical-path; deps valid")
    '
