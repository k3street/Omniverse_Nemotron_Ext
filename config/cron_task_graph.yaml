tasks:
  # ---------------------------------------------------------------------
  # TRACK A — Drift remediation (Q4)
  # ---------------------------------------------------------------------

  - id: t01
    title: "Strip deprecated fields from CP-01/02/07/08 templates"
    agent_class: sonnet
    inputs: [t10]
    outputs:
      - "workspace/templates/CP-01.json (no benchmark_vs_alternatives, verified_date, verified_metrics)"
      - "workspace/templates/CP-02.json (no verified_date, verified_metrics; add extends:'CP-01')"
      - "workspace/templates/CP-07.json (no cube_path, delivery)"
      - "workspace/templates/CP-08.json (move compute_stack_placement_verified_2026_05_07 to extension_notes)"
    verification: "python scripts/lint/lint_canonical_templates.py --strict"
    estimated_minutes: 30
    risk_level: low
    priority_tier: 2
    cron_safe: true
    source: "Q4 §3.2 + Q2 §6.3"
    track: A_drift_remediation

  - id: t02
    title: "Fix extends_notes typo in CP-NEW-multi-amr-corridor"
    agent_class: sonnet
    inputs: [t10]
    outputs:
      - "workspace/templates/CP-NEW-multi-amr-corridor.json (extends_notes → extension_notes)"
    verification: "grep -l extends_notes workspace/templates/*.json must return empty"
    estimated_minutes: 5
    risk_level: low
    priority_tier: 3
    cron_safe: true
    source: "Q2 §3 + Q4 §3.2"
    track: A_drift_remediation

  - id: t03
    title: "Delete CP-NEW-peg-in-hole-single (strict subset of CP-58)"
    agent_class: human-review
    inputs: []
    outputs:
      - "workspace/templates/CP-NEW-peg-in-hole-single.json removed"
      - "git commit: 'delete CP-NEW-peg-in-hole-single (subset of CP-58)'"
    verification: "test ! -f workspace/templates/CP-NEW-peg-in-hole-single.json"
    estimated_minutes: 5
    risk_level: low
    priority_tier: 3
    cron_safe: false
    source: "Q4 §5.2; human-review per confirm_destructive_actions MEMORY"
    track: A_drift_remediation
    approval_gate: "Anton must approve delete"

  - id: t04
    title: "Remap 30 ghost TP-* IDs in role_template_index.py to existing CP templates"
    agent_class: sonnet
    inputs: [t10]
    outputs:
      - "service/isaac_assist_service/multimodal/role_template_index.py (TP-* entries point to existing CP-XX)"
      - "docs/research/2026-05-15-tp-remap-table.md (the mapping)"
    verification: |
      python -c '
      from service.isaac_assist_service.multimodal.role_template_index import ROLE_TEMPLATE_INDEX
      from pathlib import Path
      for e in ROLE_TEMPLATE_INDEX:
          assert Path(f"workspace/templates/{e.template_id}.json").exists(), f"Ghost: {e.template_id}"
      '
    estimated_minutes: 120
    risk_level: high
    priority_tier: 1
    cron_safe: true
    source: "Q3 §3 Category D, §6; Q4 §5.1"
    track: A_drift_remediation
    note: "Largest single-task lift in Track A. Q4 calls this 'highest-risk structural issue'."

  - id: t05
    title: "Mark CP-NEW-opcua-12conveyors / plc-conveyor / plc-fixture as plumbing-only"
    agent_class: sonnet
    inputs: [t10]
    outputs:
      - "3 templates with verified_status='plumbing-only (no pick-place delivery)' + settle_state: null"
    verification: "for f in CP-NEW-opcua-12conveyors CP-NEW-plc-conveyor CP-NEW-plc-fixture; do grep -q 'plumbing-only' workspace/templates/$f.json || exit 1; done"
    estimated_minutes: 30
    risk_level: low
    priority_tier: 2
    cron_safe: true
    source: "Q4 §4.5 Sub-group E2; Q6 §7 Risk 1"
    track: A_drift_remediation

  - id: t06
    title: "Run fresh form-gate on CP-67 or downgrade its verified_status"
