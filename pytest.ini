[pytest]
testpaths = tests
markers =
    l0: Unit tests — no external dependencies required
    l1: Service tests — FastAPI test client, mocked LLM/Kit
    l2: MCP tests — MCP server protocol tests
    l3: Integration tests — requires running Isaac Sim + Kit RPC
    slow: Tests that take >5 seconds
    compliance_e2e: CRM-T3 — opt-in peg-insert E2E (live Kit RPC smoke + admittance vs rigid baseline)
asyncio_mode = auto
addopts = -m l0 --tb=short -q
