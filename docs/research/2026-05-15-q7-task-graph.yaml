metadata:
  created_date: "2026-05-15"
  generator: "Q7 synthesis (Opus 4.7 1M-context)"
  dependency_format: "id-list (edge from each input to this task; topo-sort by `inputs`)"
  source_research:
    - "docs/research/2026-05-15-q1-flow-architecture.md"
    - "docs/research/2026-05-15-q2-canonical-format.md"
    - "docs/research/2026-05-15-q3-retrieval-quality.md"
    - "docs/research/2026-05-15-q4-template-drift.md"
    - "docs/research/2026-05-15-q5-gemini-integration.md"
    - "docs/research/2026-05-15-q6-canonical-pipeline.md"
    - "docs/research/2026-05-14-l-levels-discovery-audit.md"
  agent_class_legend:
    sonnet: "Pure file edits / analysis; runs autonomously in cron."
    opus: "Synthesis with cross-doc reasoning; reserved for review-author cycles."
    kit-rpc-sonnet: "Sonnet that touches Kit RPC at 127.0.0.1:8001. Single-tenant; sequential gating required."
    human-review: "Anton manual approval gate."
  estimated_minutes_legend: [5, 15, 30, 60, 120, 360]
  priority_tier_legend:
    1: "Must-do, blocks everything downstream."
    2: "High-leverage; do after Tier-1."
    3: "Nice-to-have / opportunistic."
  total_tasks: 82
  critical_path_task_count: 11
  estimated_total_wall_time_hours: 148  # 8,885 minutes ÷ 60 ≈ 148 verified by YAML parse
  notes:
    - "Kit-rpc-sonnet tasks MUST be serialized (no concurrent direct_eval per MEMORY.md kit_concurrency feedback)."
    - "Restart uvicorn (port 8000) after every tool_executor edit per MEMORY.md service_restart feedback."
    - "Restart Kit every ~30 canonicals per MEMORY.md kit_restart_autonomous feedback."
    - "Never run parallel ChromaDB writes (HNSW segfault risk) per Q6 §7.5 + MEMORY.md."

tasks:
  # ---------------------------------------------------------------------
  # TRACK A — Drift remediation (Q4)
  # ---------------------------------------------------------------------

  - id: t01_strip_deprecated_fields_cp_pioneer
    title: "Strip deprecated fields from CP-01/02/07/08 templates"
    agent_class: sonnet
    inputs: []
    outputs:
      - "workspace/templates/CP-01.json (no benchmark_vs_alternatives, verified_date, verified_metrics)"
      - "workspace/templates/CP-02.json (no verified_date, verified_metrics; add extends:'CP-01')"
      - "workspace/templates/CP-07.json (no cube_path, delivery)"
      - "workspace/templates/CP-08.json (move compute_stack_placement_verified_2026_05_07 to extension_notes)"
    verification: "python scripts/lint/lint_canonical_templates.py --strict (after t10_lint_canonical_templates_script lands)"
    estimated_minutes: 30
    risk_level: low
    priority_tier: 2
    cron_safe: true
    source: "Q4 §3.2 + Q2 §6.3 'deprecated field removal'"

  - id: t02_fix_extends_notes_typo
    title: "Fix extends_notes typo in CP-NEW-multi-amr-corridor"
    agent_class: sonnet
    inputs: []
    outputs:
      - "workspace/templates/CP-NEW-multi-amr-corridor.json (extends_notes → extension_notes; remove duplicate)"
    verification: "grep -l extends_notes workspace/templates/*.json (must return empty)"
    estimated_minutes: 5
    risk_level: low
    priority_tier: 3
    cron_safe: true
    source: "Q2 §3 row 'T1 Typo variant'; Q4 §3.2"

  - id: t03_delete_peg_in_hole_duplicate
    title: "Delete CP-NEW-peg-in-hole-single (strict subset of CP-58)"
    agent_class: human-review
    inputs: []
    outputs:
      - "workspace/templates/CP-NEW-peg-in-hole-single.json removed"
      - "git commit message: 'delete CP-NEW-peg-in-hole-single (subset of CP-58)'"
    verification: "test -f workspace/templates/CP-NEW-peg-in-hole-single.json must fail"
    estimated_minutes: 5
    risk_level: low
    priority_tier: 3
    cron_safe: false
    source: "Q4 §5.2; explicit human-review per 'confirm before destructive' MEMORY"

  - id: t04_remap_ghost_tp_corpus
    title: "Remap 30 ghost TP-* IDs in role_template_index.py to existing CP templates"
    agent_class: sonnet
    inputs: [t10_lint_canonical_templates_script]
    outputs:
      - "service/isaac_assist_service/multimodal/role_template_index.py (TP-* entries point to existing CP-XX)"
      - "docs/research/2026-05-15-tp-remap-table.md (the mapping)"
    verification: "python -c 'from service.isaac_assist_service.multimodal.role_template_index import ROLE_TEMPLATE_INDEX; from pathlib import Path; [exit(1) for e in ROLE_TEMPLATE_INDEX if not Path(f\"workspace/templates/{e.template_id}.json\").exists()]'"
    estimated_minutes: 120
    risk_level: high
    priority_tier: 1
    cron_safe: true
    source: "Q3 §3 (Category D), §6; Q4 §5.1 'Ghost Corpus'"
    note: "Largest single-task lift in Track A. Q4 calls this 'highest-risk structural issue'."

  - id: t05_mark_plumbing_only_cps
    title: "Mark CP-NEW-opcua-12conveyors / plc-conveyor / plc-fixture as plumbing-only"
    agent_class: sonnet
    inputs: [t10_lint_canonical_templates_script]
    outputs:
      - "3 templates with verified_status='plumbing-only (no pick-place delivery)' + settle_state: null"
    verification: "for f in CP-NEW-{opcua-12conveyors,plc-conveyor,plc-fixture}; do grep -q 'plumbing-only' workspace/templates/$f.json || exit 1; done"
    estimated_minutes: 30
    risk_level: low
    priority_tier: 2
    cron_safe: true
    source: "Q4 §4.5 Sub-group E2; Q6 §7 'Risk 1: Build OK ≠ Shippable'"

  - id: t06_downgrade_cp67
    title: "Run fresh form-gate on CP-67 or downgrade its verified_status"
    agent_class: kit-rpc-sonnet
    inputs: [t30_kit_supervisor_check]
    outputs:
      - "workspace/templates/CP-67.json (updated verified_status with cube_final OR documented fail)"
    verification: "python scripts/qa/function_gate_suite.py --filter CP-67 --runs 3 produces a result row"
    estimated_minutes: 30
    risk_level: med
    priority_tier: 3
    cron_safe: true
    source: "Q4 §5.3"

  - id: t07_form_gate_d2_priority_3
    title: "Form-gate 3 priority D2 templates (CP-22, CP-46, CP-51)"
    agent_class: kit-rpc-sonnet
    inputs: [t30_kit_supervisor_check]
    outputs:
      - "3 templates: verified_status updated with form-gate outcome"
      - "workspace/baselines/form-gate-d2-priority-2026-05-XX.json"
    verification: "python scripts/qa/function_gate_suite.py --filter 'CP-22 CP-46 CP-51' --form-gate-only"
    estimated_minutes: 120
    risk_level: med
    priority_tier: 2
    cron_safe: true
    source: "Q4 §6 'Minimum viable remediation' bullet 6"

  - id: t08_form_gate_d2_remaining
    title: "Form-gate remaining D2 templates (CP-35,37,40,48,52,53,57,60,62,65,68,76)"
    agent_class: kit-rpc-sonnet
    inputs: [t07_form_gate_d2_priority_3]
    outputs:
      - "12 templates: verified_status updated"
      - "workspace/baselines/form-gate-d2-bulk-2026-05-XX.json"
    verification: "python scripts/qa/function_gate_suite.py --filter '<12-list>' --form-gate-only"
    estimated_minutes: 360
    risk_level: med
    priority_tier: 3
    cron_safe: true
    source: "Q4 §4.4 sub-group D2"

  - id: t09_sweep_never_run_t2
    title: "Sweep 102 never-run T2 templates via QA campaign"
    agent_class: kit-rpc-sonnet
    inputs: [t30_kit_supervisor_check]
    outputs:
      - "workspace/baselines/t2-never-run-sweep-2026-05-XX.json"
      - "102 templates either confirmed-shippable or flagged for re-author"
    verification: "find workspace/baselines/t2-never-run-sweep*.json -mmin -1440"
    estimated_minutes: 360
    risk_level: low
    priority_tier: 3
    cron_safe: true
    source: "Q4 §4.1; ~15 agent-hours total — split into 15 sub-batches if needed"

  # ---------------------------------------------------------------------
  # TRACK B — Schema migration (Q2)
  # ---------------------------------------------------------------------

  - id: t10_lint_canonical_templates_script
    title: "Build scripts/lint/lint_canonical_templates.py (conformance gate)"
    agent_class: sonnet
    inputs: []
    outputs:
      - "scripts/lint/lint_canonical_templates.py (pseudocode in Q2 §5)"
      - ".github/workflows/ci.yml updated to run --strict"
    verification: "python scripts/lint/lint_canonical_templates.py --strict ; echo $? (exit 0 expected)"
    estimated_minutes: 120
    risk_level: low
    priority_tier: 1
    cron_safe: true
    source: "Q2 §5 'Conformance Check Tool Specification'"
    note: "CRITICAL PATH — gates Track A + B downstream tasks."

  - id: t11_migrate_intent_mechanically_104
    title: "Run offline migration: add intent (pattern_hint+counts+features) to 104 CP-06..87 + CP-NEW templates"
    agent_class: sonnet
    inputs: [t10_lint_canonical_templates_script]
    outputs:
      - "scripts/migration/add_intent_mechanically.py"
      - "104 templates with new intent field (no human review yet)"
    verification: "python -c 'import json,glob; cnt=sum(1 for f in glob.glob(\"workspace/templates/CP-*.json\") if \"intent\" in json.load(open(f))); assert cnt>=109'"
    estimated_minutes: 120
    risk_level: low
    priority_tier: 1
    cron_safe: true
    source: "Q2 §4.2 (mechanically-inferable fields); §6.4 row 'Phase 0'"

  - id: t12_verify_pattern_hint_human_review_104
    title: "Human-verify mechanically-assigned pattern_hint for 104 templates"
    agent_class: human-review
    inputs: [t11_migrate_intent_mechanically_104]
    outputs:
      - "0-15 corrections committed to templates"
    verification: "git log --oneline workspace/templates/ since='last 7 days' | wc -l > 0"
    estimated_minutes: 120
    risk_level: med
    priority_tier: 2
    cron_safe: false
    source: "Q2 §4.4 Phase 1 'human review, 104 templates'"

  - id: t13_fill_settle_state_gaps
    title: "Fill settle_state in ~24 CP templates via existing extractor functions"
    agent_class: sonnet
    inputs: [t10_lint_canonical_templates_script]
    outputs:
      - "scripts/migration/fill_settle_state.py"
      - "~24 templates with new settle_state field"
    verification: "python scripts/lint/lint_canonical_templates.py --warn-roles 2>&1 | grep -c 'T5_MISSING_SETTLE_STATE' (must decrease)"
    estimated_minutes: 60
    risk_level: low
    priority_tier: 2
    cron_safe: true
    source: "Q2 §4.2 (i); §6.4 row 'Phase 0b'"

  - id: t14_author_roles_role_defaults_cp_new
    title: "Author roles + role_defaults for 22 CP-NEW templates (use CP-01 as ref)"
    agent_class: sonnet
    inputs: [t11_migrate_intent_mechanically_104]
    outputs:
      - "22 CP-NEW templates with roles + role_defaults populated"
    verification: "python -c 'import json,glob; cnt=sum(1 for f in glob.glob(\"workspace/templates/CP-NEW-*.json\") if \"roles\" in json.load(open(f))); assert cnt==22'"
    estimated_minutes: 360
    risk_level: med
    priority_tier: 2
    cron_safe: true
    source: "Q2 §4.4 Phase 2 'start with CP-NEW-*'"

  - id: t15_author_roles_cp_06_to_87
    title: "Author roles + role_defaults for CP-06..87 (82 templates)"
    agent_class: sonnet
    inputs: [t14_author_roles_role_defaults_cp_new]
    outputs:
      - "82 CP-numeric templates with roles populated"
    verification: "scripts/lint/lint_canonical_templates.py --warn-roles ; grep R1_MISSING_INTENT count must approach 0"
    estimated_minutes: 360
    risk_level: med
    priority_tier: 2
    cron_safe: true
    source: "Q2 §4.4 Phase 2 (~78 person-hours estimate); split into 5 batches of ~16"

  - id: t16_generate_code_template
    title: "Generate code_template for 104 templates via {{role.field}} substitution"
    agent_class: sonnet
    inputs: [t15_author_roles_cp_06_to_87]
    outputs:
      - "104 templates with code_template field"
    verification: "pytest tests/test_role_template_equivalence.py -k 'CP-' (must pass for all 104)"
    estimated_minutes: 360
    risk_level: high
    priority_tier: 2
    cron_safe: true
    source: "Q2 §4.4 Phase 3 'generate code_template'"

  - id: t17_equivalence_gate_extension
    title: "Extend test_role_template_equivalence.py to parametrize over all role-bearing templates"
    agent_class: sonnet
    inputs: [t14_author_roles_role_defaults_cp_new]
    outputs:
      - "tests/test_role_template_equivalence.py (parametrize beyond CP-01..05)"
    verification: "pytest tests/test_role_template_equivalence.py --collect-only | wc -l > 5"
    estimated_minutes: 30
    risk_level: low
    priority_tier: 2
    cron_safe: true
    source: "Q6 §7 'Risk 4: Role-migration drift'; Q2 §6.2"

  - id: t18_ci_wire_lint_and_equivalence
    title: "Wire lint + equivalence test into CI as commit gate"
    agent_class: sonnet
    inputs: [t10_lint_canonical_templates_script, t17_equivalence_gate_extension]
    outputs:
      - ".github/workflows/ci.yml (lint + pytest steps)"
    verification: "gh workflow view CI shows lint_canonical_templates step"
    estimated_minutes: 30
    risk_level: low
    priority_tier: 1
    cron_safe: true
    source: "Q2 §5 'Gate integration'"

  # ---------------------------------------------------------------------
  # TRACK C — Retrieval benchmark + iterative retrieval (Q3)
  # ---------------------------------------------------------------------

  - id: t19_build_30_prompt_benchmark
    title: "Build 30-prompt retrieval benchmark with ground-truth labels"
    agent_class: sonnet
    inputs: []
    outputs:
      - "workspace/benchmarks/retrieval_30prompts_v1.jsonl (30 rows: prompt, ground_truth, expected_mode)"
      - "scripts/qa/run_retrieval_benchmark.py (pseudocode in Q3 §8)"
    verification: "wc -l workspace/benchmarks/retrieval_30prompts_v1.jsonl (must equal 30)"
    estimated_minutes: 120
    risk_level: low
    priority_tier: 1
    cron_safe: true
    source: "Q3 §8 'Proposed 30-prompt test set'; Q3 §9 'highest-priority' bullet 1"
    note: "CRITICAL PATH — Track C anchor."

  - id: t20_measure_current_hit_rate
    title: "Run retrieval benchmark on current similarity-only path; record hit@1, hit@3, mode_accuracy"
    agent_class: sonnet
    inputs: [t19_build_30_prompt_benchmark]
    outputs:
      - "workspace/baselines/retrieval-baseline-30prompts-v1.json"
    verification: "python scripts/qa/run_retrieval_benchmark.py --baseline (file exists with hit_at_1 key)"
    estimated_minutes: 30
    risk_level: low
    priority_tier: 1
    cron_safe: true
    source: "Q3 §2b 'no retrieval-hit-rate metric'; §9 'turns probably-works into a number'"

  - id: t21_implement_evaluate_candidates_tool
    title: "Add evaluate_candidates tool (LLM-callable, Option B from Q3 §4)"
    agent_class: sonnet
    inputs: [t20_measure_current_hit_rate]
    outputs:
      - "service/isaac_assist_service/chat/tools/handlers/retrieval.py (new handler)"
      - "tool_schemas.py entry for evaluate_candidates"
      - "tests/test_evaluate_candidates.py"
    verification: "pytest tests/test_evaluate_candidates.py"
    estimated_minutes: 120
    risk_level: med
    priority_tier: 2
    cron_safe: true
    source: "Q3 §4 'Recommendation: Option B for the first iteration'"
    note: "RESTART uvicorn after this lands (tool_executor edit)."

  - id: t22_ab_iterative_vs_single_shot
    title: "A/B test: iterative retrieval (with evaluate_candidates) vs single-shot on 30 prompts"
    agent_class: sonnet
    inputs: [t21_implement_evaluate_candidates_tool, t20_measure_current_hit_rate]
    outputs:
      - "workspace/baselines/retrieval-iterative-vs-single-2026-05-XX.json"
      - "docs/research/2026-05-XX-iterative-retrieval-ab-results.md"
    verification: "grep delta_hit_at_1 workspace/baselines/retrieval-iterative-vs-single-*.json"
    estimated_minutes: 60
    risk_level: low
    priority_tier: 2
    cron_safe: true
    source: "Q3 §4 'A/B test plan'; latency budget §7"

  - id: t23_wire_role_retriever_prefilter
    title: "Wire RoleRetriever as pre-filter in orchestrator (after t04 ghost-corpus fix)"
    agent_class: sonnet
    inputs: [t04_remap_ghost_tp_corpus]
    outputs:
      - "service/isaac_assist_service/chat/orchestrator.py (role-hint extraction + pre-filter block)"
      - "service/isaac_assist_service/chat/tools/role_retriever.py (any minor wiring fixes)"
    verification: "pytest tests/test_role_based_templates.py -k integration"
    estimated_minutes: 60
    risk_level: med
    priority_tier: 2
    cron_safe: true
    source: "Q3 §6 'Recommended wiring order' Step 1+3+4"
    note: "RESTART uvicorn after this lands."

  - id: t24_expand_intent_corpus_cp_06_to_30
    title: "Expand intent fields from CP-01..05 to CP-06..30 (enables structural filter)"
    agent_class: sonnet
    inputs: [t11_migrate_intent_mechanically_104, t12_verify_pattern_hint_human_review_104]
    outputs:
      - "25 CP templates with intent field (already done mechanically in t11, validated here)"
    verification: "python -c 'import json; [exit(1) for f in [f\"workspace/templates/CP-{i:02d}.json\" for i in range(6,31)] if \"intent\" not in json.load(open(f))]'"
    estimated_minutes: 30
    risk_level: low
    priority_tier: 2
    cron_safe: true
    source: "Q3 §9 'Immediate improvements' bullet 3"

  - id: t25_enable_multimodal_text_intent_flag
    title: "Enable MULTIMODAL_TEXT_INTENT=on after intent corpus has ≥30 templates"
    agent_class: sonnet
    inputs: [t24_expand_intent_corpus_cp_06_to_30, t22_ab_iterative_vs_single_shot]
    outputs:
      - ".env or config/feature_flags.yaml entry"
    verification: "grep MULTIMODAL_TEXT_INTENT .env (must show on)"
    estimated_minutes: 5
    risk_level: med
    priority_tier: 2
    cron_safe: false
    source: "Q3 §9 'Unlock MULTIMODAL_TEXT_INTENT=on'"

  # ---------------------------------------------------------------------
  # TRACK D — Gemini integration (Q5)
  # ---------------------------------------------------------------------

  - id: t26_gemini_env_setup
    title: "Set up .env.local with LLM_MODE=cloud + GEMINI_API_KEY + CLOUD_MODEL_NAME=gemini-2.5-flash"
    agent_class: human-review
    inputs: []
    outputs:
      - ".env.local (with secrets — NOT committed)"
    verification: "python -c 'from service.isaac_assist_service.chat.provider_factory import get_default_provider; print(type(get_default_provider()))' (must show GeminiProvider)"
    estimated_minutes: 15
    risk_level: low
    priority_tier: 1
    cron_safe: false
    source: "Q5 §2 'What needs to be done' row 1"

  - id: t27_smoke_test_gemini_3_prompts
    title: "Smoke-test 3 trivial prompts (G-01, G-02, CW-01) with Gemini Flash backend"
    agent_class: kit-rpc-sonnet
    inputs: [t26_gemini_env_setup, t30_kit_supervisor_check]
    outputs:
      - "workspace/baselines/gemini_smoke_2026-05-XX.json (3 prompts, success status)"
    verification: "grep success workspace/baselines/gemini_smoke_*.json"
    estimated_minutes: 30
    risk_level: high
    priority_tier: 1
    cron_safe: true
    source: "Q5 §5 Day 1"

  - id: t28_gemini_baseline_run_30prompts
    title: "Full 30-prompt Gemini baseline run (Day 2 in Q5)"
    agent_class: kit-rpc-sonnet
    inputs: [t27_smoke_test_gemini_3_prompts]
    outputs:
      - "workspace/baselines/flash_baseline_run1.jsonl"
    verification: "wc -l workspace/baselines/flash_baseline_run1.jsonl (must equal 30)"
    estimated_minutes: 120
    risk_level: med
    priority_tier: 1
    cron_safe: true
    source: "Q5 §5 Day 2; cost ~$0.57"

  - id: t29_categorize_flash_failures
    title: "Analyze flash_baseline_run1 — categorize failures: A=tool-surface bug, B=resolver fail, C=Flash reason, D=harness"
    agent_class: opus
    inputs: [t28_gemini_baseline_run_30prompts]
    outputs:
      - "docs/research/2026-05-XX-flash-failure-analysis.md"
      - "docs/research/2026-05-XX-tool-surface-bug-list.md (Cat A+B)"
    verification: "grep -c 'category: A' docs/research/2026-05-XX-flash-failure-analysis.md"
    estimated_minutes: 60
    risk_level: low
    priority_tier: 1
    cron_safe: true
    source: "Q5 §5 Day 3"
    note: "Opus synthesis required — cross-doc reasoning over Q5 §6 stress dimensions + Q5 §9 predicted bugs."

  - id: t30_kit_supervisor_check
    title: "Verify kit_supervisor.py + cron infrastructure is healthy"
    agent_class: sonnet
    inputs: []
    outputs:
      - "audit report: docs/research/2026-05-XX-kit-supervisor-audit.md"
    verification: "python scripts/qa/kit_supervisor.py --health-check"
    estimated_minutes: 30
    risk_level: low
    priority_tier: 1
    cron_safe: true
    source: "Spec 2 §18 Kit Supervisor; MEMORY 'kit_restart_autonomous'"
    note: "Anchors all kit-rpc-sonnet tasks. Must pass before t06/t07/t08/t27 etc."

  - id: t31_fix_tool_surface_round1
    title: "Fix 3-5 highest-confidence tool-surface bugs from t29"
    agent_class: sonnet
    inputs: [t29_categorize_flash_failures]
    outputs:
      - "tool_schemas.py edits (pattern annotations, description rewrites)"
      - "tool_executor.py error-message edits"
    verification: "pytest tests/ -k 'schema' (must still pass)"
    estimated_minutes: 60
    risk_level: med
    priority_tier: 1
    cron_safe: true
    source: "Q5 §5 Day 4"
    note: "RESTART uvicorn after edits."

  - id: t32_gemini_rerun_after_fix
    title: "Re-run failing subset of flash_baseline after t31 fixes"
    agent_class: kit-rpc-sonnet
    inputs: [t31_fix_tool_surface_round1]
    outputs:
      - "workspace/baselines/flash_baseline_run2.jsonl"
    verification: "diff workspace/baselines/flash_baseline_run{1,2}.jsonl"
    estimated_minutes: 60
    risk_level: low
    priority_tier: 1
    cron_safe: true
    source: "Q5 §5 Day 4"

  - id: t33_gemini_full_corpus_run2
    title: "Full corpus re-run with all fixes (Day 5)"
    agent_class: kit-rpc-sonnet
    inputs: [t32_gemini_rerun_after_fix]
    outputs:
      - "workspace/baselines/flash_run_final_old_model.jsonl"
    verification: "grep success_rate workspace/baselines/flash_run_final_old_model.jsonl"
    estimated_minutes: 120
    risk_level: low
    priority_tier: 1
    cron_safe: true
    source: "Q5 §5 Day 5"

  - id: t34_gemini_round2_fixes
    title: "Round-2 tool-surface fixes (3-5 more bugs)"
    agent_class: sonnet
    inputs: [t33_gemini_full_corpus_run2]
    outputs:
      - "tool_schemas.py + tool_executor.py round-2 edits"
    verification: "pytest tests/ -k 'schema or surface'"
    estimated_minutes: 60
    risk_level: med
    priority_tier: 2
    cron_safe: true
    source: "Q5 §5 Day 6"
    note: "RESTART uvicorn."

  - id: t35_gemini_model_swap_protocol
    title: "Run model swap protocol on Day 7 (~2026-05-22): control run + new model"
    agent_class: kit-rpc-sonnet
    inputs: [t33_gemini_full_corpus_run2]
    outputs:
      - "workspace/baselines/flash_new_model_run1.jsonl"
      - "workspace/baselines/flash_control_run.jsonl"
    verification: "ls workspace/baselines/flash_*.jsonl (must have both files)"
    estimated_minutes: 120
    risk_level: med
    priority_tier: 1
