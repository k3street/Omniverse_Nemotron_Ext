<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Isaac Assist architecture diagram</title>
<desc>System architecture showing Isaac Sim extension connecting to a FastAPI backend service, which interfaces with LLM providers, LiveKit voice infrastructure, and a version-aware knowledge base.</desc>

<style>
  :root {
    --bg: #ffffff;
    --text-primary: #1a1a1a;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --border: rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --text-primary: #e8e6df;
      --text-secondary: #b4b2a9;
      --text-tertiary: #888780;
      --border: rgba(255,255,255,0.15);
    }
    .green-outer { fill: #085041; stroke: #5DCAA5; }
    .teal-box { fill: #085041; stroke: #5DCAA5; }
    .teal-title { fill: #9FE1CB; }
    .teal-sub { fill: #5DCAA5; }
    .purple-outer { fill: #3C3489; stroke: #AFA9EC; }
    .purple-box { fill: #3C3489; stroke: #AFA9EC; }
    .purple-title { fill: #CECBF6; }
    .purple-sub { fill: #AFA9EC; }
    .coral-outer { fill: #712B13; stroke: #F0997B; }
    .coral-box { fill: #712B13; stroke: #F0997B; }
    .coral-title { fill: #F5C4B3; }
    .coral-sub { fill: #F0997B; }
    .amber-box { fill: #633806; stroke: #EF9F27; }
    .amber-title { fill: #FAC775; }
    .amber-sub { fill: #EF9F27; }
    .blue-box { fill: #0C447C; stroke: #85B7EB; }
    .blue-title { fill: #B5D4F4; }
    .blue-sub { fill: #85B7EB; }
    .gray-box { fill: #444441; stroke: #B4B2A9; }
    .gray-title { fill: #D3D1C7; }
    .gray-sub { fill: #B4B2A9; }
    .green-title { fill: #9FE1CB; }
    .green-sub { fill: #5DCAA5; }
    .arr-line { stroke: #b4b2a9; }
    .label-text { fill: #b4b2a9; }
    .leader-line { stroke: #888780; }
  }
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .title { font-size: 14px; font-weight: 500; }
  .subtitle { font-size: 12px; font-weight: 400; }
  .green-outer { fill: #E1F5EE; stroke: #0F6E56; }
  .teal-box { fill: #E1F5EE; stroke: #0F6E56; }
  .teal-title { fill: #085041; }
  .teal-sub { fill: #0F6E56; }
  .purple-outer { fill: #EEEDFE; stroke: #534AB7; }
  .purple-box { fill: #EEEDFE; stroke: #534AB7; }
  .purple-title { fill: #3C3489; }
  .purple-sub { fill: #534AB7; }
  .coral-outer { fill: #FAECE7; stroke: #993C1D; }
  .coral-box { fill: #FAECE7; stroke: #993C1D; }
  .coral-title { fill: #712B13; }
  .coral-sub { fill: #993C1D; }
  .amber-box { fill: #FAEEDA; stroke: #854F0B; }
  .amber-title { fill: #633806; }
  .amber-sub { fill: #854F0B; }
  .blue-box { fill: #E6F1FB; stroke: #185FA5; }
  .blue-title { fill: #0C447C; }
  .blue-sub { fill: #185FA5; }
  .gray-box { fill: #F1EFE8; stroke: #5F5E5A; }
  .gray-title { fill: #444441; }
  .gray-sub { fill: #5F5E5A; }
  .green-title { fill: #085041; }
  .green-sub { fill: #0F6E56; }
  .arr-line { stroke: #5f5e5a; stroke-width: 1.5; fill: none; }
  .label-text { fill: #5f5e5a; }
  .leader-line { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }
</style>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- ===== ISAAC SIM CONTAINER ===== -->
<rect class="green-outer" x="40" y="30" width="280" height="140" rx="16" stroke-width="0.5"/>
<text class="title green-title" x="180" y="58" text-anchor="middle">NVIDIA Isaac Sim</text>
<text class="subtitle green-sub" x="180" y="76" text-anchor="middle">5.1 / 6.0</text>

<!-- Extension panel inside Isaac Sim -->
<rect class="teal-box" x="70" y="92" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="title teal-title" x="180" y="112" text-anchor="middle" dominant-baseline="central">omni.isaac.assist</text>
<text class="subtitle teal-sub" x="180" y="132" text-anchor="middle" dominant-baseline="central">Dockable UI panel</text>

<!-- ===== FASTAPI BACKEND ===== -->
<rect class="purple-outer" x="40" y="220" width="600" height="120" rx="16" stroke-width="0.5"/>
<text class="title purple-title" x="340" y="248" text-anchor="middle">FastAPI backend service</text>
<text class="subtitle purple-sub" x="340" y="266" text-anchor="middle">localhost:8000</text>

<!-- Modules inside backend -->
<rect class="purple-box" x="60" y="280" width="100" height="44" rx="6" stroke-width="0.5"/>
<text class="title purple-title" x="110" y="302" text-anchor="middle" dominant-baseline="central">Chat</text>

<rect class="purple-box" x="172" y="280" width="100" height="44" rx="6" stroke-width="0.5"/>
<text class="title purple-title" x="222" y="302" text-anchor="middle" dominant-baseline="central">Analyzer</text>

<rect class="purple-box" x="284" y="280" width="100" height="44" rx="6" stroke-width="0.5"/>
<text class="title purple-title" x="334" y="302" text-anchor="middle" dominant-baseline="central">Planner</text>

<rect class="purple-box" x="396" y="280" width="110" height="44" rx="6" stroke-width="0.5"/>
<text class="title purple-title" x="451" y="302" text-anchor="middle" dominant-baseline="central">Governance</text>

<rect class="purple-box" x="518" y="280" width="100" height="44" rx="6" stroke-width="0.5"/>
<text class="title purple-title" x="568" y="302" text-anchor="middle" dominant-baseline="central">RAG</text>

<!-- ===== CONNECTION: Extension to Backend ===== -->
<line class="arr-line" x1="180" y1="170" x2="180" y2="218" marker-end="url(#arrow)"/>
<text class="subtitle label-text" x="188" y="200" text-anchor="start">REST / WebSocket</text>

<!-- ===== LLM PROVIDERS ===== -->
<rect class="coral-outer" x="40" y="390" width="200" height="100" rx="12" stroke-width="0.5"/>
<text class="title coral-title" x="140" y="418" text-anchor="middle">LLM providers</text>

<rect class="coral-box" x="56" y="432" width="80" height="40" rx="6" stroke-width="0.5"/>
<text class="subtitle coral-sub" x="96" y="452" text-anchor="middle" dominant-baseline="central">Ollama</text>

<rect class="coral-box" x="148" y="432" width="80" height="40" rx="6" stroke-width="0.5"/>
<text class="subtitle coral-sub" x="188" y="452" text-anchor="middle" dominant-baseline="central">Cloud</text>

<!-- ===== KNOWLEDGE BASE ===== -->
<rect class="amber-box" x="270" y="390" width="170" height="100" rx="12" stroke-width="0.5"/>
<text class="title amber-title" x="355" y="420" text-anchor="middle">Knowledge base</text>
<text class="subtitle amber-sub" x="355" y="440" text-anchor="middle">Code patterns (JSONL)</text>
<text class="subtitle amber-sub" x="355" y="458" text-anchor="middle">Docs + fine-tune data</text>
<text class="subtitle amber-sub" x="355" y="476" text-anchor="middle">Version-aware</text>

<!-- ===== LIVEKIT ===== -->
<rect class="blue-box" x="470" y="390" width="170" height="100" rx="12" stroke-width="0.5"/>
<text class="title blue-title" x="555" y="420" text-anchor="middle">LiveKit</text>
<text class="subtitle blue-sub" x="555" y="440" text-anchor="middle">Voice / vision</text>
<text class="subtitle blue-sub" x="555" y="458" text-anchor="middle">WebRTC + Redis</text>
<text class="subtitle blue-sub" x="555" y="476" text-anchor="middle">Optional</text>

<!-- ===== CONNECTIONS: Backend to bottom row ===== -->
<line class="arr-line" x1="140" y1="340" x2="140" y2="388" marker-end="url(#arrow)"/>
<line class="arr-line" x1="355" y1="340" x2="355" y2="388" marker-end="url(#arrow)"/>
<line class="arr-line" x1="555" y1="340" x2="555" y2="388" marker-end="url(#arrow)"/>

<!-- ===== USD SCENE CONTEXT ===== -->
<rect class="gray-box" x="380" y="62" width="220" height="86" rx="12" stroke-width="0.5"/>
<text class="title gray-title" x="490" y="90" text-anchor="middle">USD stage context</text>
<text class="subtitle gray-sub" x="490" y="110" text-anchor="middle">Snapshots, rollback</text>
<text class="subtitle gray-sub" x="490" y="128" text-anchor="middle">pxr / USD Python API</text>

<!-- Extension to USD stage -->
<line class="arr-line" x1="290" y1="120" x2="378" y2="105" marker-end="url(#arrow)"/>

<!-- USD stage to backend -->
<line class="arr-line" x1="490" y1="148" x2="490" y2="218" marker-end="url(#arrow)"/>
<text class="subtitle label-text" x="498" y="190" text-anchor="start">Scene telemetry</text>

</svg>
